<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="Film camera">
  <rect width="32" height="32" rx="6" fill="#ece9e4"/>
  <!-- camera body -->
  <rect x="3" y="13" width="18" height="14" rx="2" fill="#2d2d35" stroke="#1a1a22" stroke-width="0.75"/>
  <!-- film reels -->
  <circle cx="9.5" cy="8" r="4.5" fill="#3a3a45" stroke="#1f1f26" stroke-width="0.65"/>
  <circle cx="19" cy="8" r="4.5" fill="#3a3a45" stroke="#1f1f26" stroke-width="0.65"/>
  <circle cx="9.5" cy="8" r="1.6" fill="#121218"/>
  <circle cx="19" cy="8" r="1.6" fill="#121218"/>
  <!-- viewfinder -->
  <rect x="11" y="11" width="6" height="3" rx="0.6" fill="#2d2d35" stroke="#1a1a22" stroke-width="0.4"/>
  <!-- lens -->
  <path fill="#4a4a56" stroke="#2d2d35" stroke-width="0.5" d="M21 15h7l2.2 4-2.2 4H21v-8z"/>
  <ellipse cx="29.2" cy="19" rx="2.2" ry="3.4" fill="#0d0d12" stroke="#1a1a22" stroke-width="0.35"/>
  <!-- film gate accent -->
  <rect x="5" y="17" width="14" height="2.4" rx="0.4" fill="#d4a84b"/>
</svg>
